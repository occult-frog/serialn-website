<!DOCTYPE html>
<html>
    <head>
        <title>serialn</title>
        <style>
            @font-face {
                font-family: JetBrainsMono;
                src: url('./fonts/JetBrainsMono-Regular.woff2') format('woff2');
            }
            @font-face {
                font-family: JetBrainsMonoBold;
                src: url('./fonts/JetBrainsMono-Bold.woff2') format('woff2');
            }

            .commandsbox {
                flex: 1;
                border: 1px solid;
                border-radius: 5px;
                border-color: #2a313c;
                width: auto;
                height: 22ch;
                text-align: left;
                background-color: #1c222c;
                transition: height 0.2s ease-in-out;
            }

            .commandsbox:hover {border-color: #DDAA3F; background-color: #252a32; height: 23ch;}

            .commandsrow {
                display: flex;
                gap: 15px;
                width: 60%;
                flex-direction: row;
                flex: 1;
            }

            .navbutton {
                color: #8D949D;
                background-color: #0E1116;
                border: none;
                font-size: 15px;
                font-family: JetBrainsMono;
                border-radius: 5px;
                height: 3ch;
                transition: background-color 0.2s ease-in-out;
                flex: 1;
                margin-right: 1ch;
            }

            .navbutton:hover {background-color: #1c222c; color: #E7EDF2}
        </style>
    </head>
    <body style="background-color: #0E1116;">
        <div style="display: flex; flex-direction: row; margin-top: 2ch;">
            <nav>
                <button style="font-family: JetBrainsMono; font-size: 20px; color: #E7EDF2; flex: 1; border: none; background-color: #0E1116; margin-right: 2ch;">serialn</button>
                <button class="navbutton" onclick="document.location.href='index.html'" style="width: 6ch">Home</button>
                <button class="navbutton" onclick="document.location.href='allcommands.html'" style="width: 10ch; color: #DDAA3F;">Commands</button>
                <button class="navbutton" style="width: 9ch">Install</button>
            </nav>
        </div>

        <hr style="width: 100%; margin-top: 2ch; margin-bottom: 100px; border: none; border-top: 1px solid #31363C;">

        <p style="color: #E7EDF2; font-size: 30px; margin-left: 20%; font-family: JetBrainsMonoBold;">
                All Commands
        </p>
        <p style="color: #8D949D; font-size: 15px; margin-left: 20%; font-family: JetBrainsMono; margin-bottom: 4%;">
                Click a command for use, options, and examples.
        </p>

        <center>
            <div style="display: flex; flex-direction: column; gap: 15px; align-items: center;">
                <div class="commandsrow">
                    <button class="commandsbox" onclick="document.location.href='commands/list-recipes.html'">
                        <p style="font-family: JetBrainsMonoBold; font-size: 15px; color: #E7EDF2; margin: 2%; margin-bottom: 0;">
                            list-recipes
                        </p>
                        <br>
                        <p style="font-family: JetBrainsMono; font-size: 14px; color: #89BEFA; margin: 2%; margin-bottom: 0;">
                            list-recipes
                        </p>
                        <br>
                        <p style="font-family: JetBrainsMono; font-size: 12px; color: #8D949D; margin: 2%; margin-bottom: 0;">
                            List all recipes from your collection in a neat and ordered manner.
                        </p>
                    </button>
                    <button class="commandsbox"  onclick="document.location.href='commands/view-recipe.html'">
                        <p style="font-family: JetBrainsMonoBold; font-size: 15px; color: #E7EDF2; margin: 2%; margin-bottom: 0;">
                            view-recipe
                        </p>
                        <br>
                        <p style="font-family: JetBrainsMono; font-size: 14px; color: #89BEFA; margin: 2%; margin-bottom: 0;">
                            view-recipe [RECIPENAME] [OPTIONS]
                        </p>
                        <br>
                        <p style="font-family: JetBrainsMono; font-size: 12px; color: #8D949D; margin: 2%; margin-bottom: 0;">
                            Display the full recipe scaled by 1 or more.
                        </p>
                    </button>
                    <button class="commandsbox"  onclick="document.location.href='commands/refresh-recipes.html'">
                        <p style="font-family: JetBrainsMonoBold; font-size: 15px; color: #E7EDF2; margin: 2%; margin-bottom: 0;">
                            refresh-recipes
                        </p>
                        <br>
                        <p style="font-family: JetBrainsMono; font-size: 14px; color: #89BEFA; margin: 2%; margin-bottom: 0;">
                            refresh-recipes
                        </p>
                        <br>
                        <p style="font-family: JetBrainsMono; font-size: 12px; color: #8D949D; margin: 2%; margin-bottom: 0;">
                            Sync and keep track of your recipe collection via a recipe index.
                        </p>
                    </button>
                </div>
                <div class="commandsrow">
                    <button class="commandsbox"  onclick="document.location.href='commands/add-recipe.html'">
                        <p style="font-family: JetBrainsMonoBold; font-size: 15px; color: #E7EDF2; margin: 2%; margin-bottom: 0;">
                            add-recipe
                        </p>
                        <br>
                        <p style="font-family: JetBrainsMono; font-size: 14px; color: #89BEFA; margin: 2%; margin-bottom: 0;">
                            add-recipe [RECIPENAME]
                        </p>
                        <br>
                        <p style="font-family: JetBrainsMono; font-size: 12px; color: #8D949D; margin: 2%; margin-bottom: 0;">
                            Add a new recipe to your collection interactively.
                        </p>
                    </button>
                    <button class="commandsbox"  onclick="document.location.href='commands/remove-recipe.html'">
                        <p style="font-family: JetBrainsMonoBold; font-size: 15px; color: #E7EDF2; margin: 2%; margin-bottom: 0;">
                            remove-recipe
                        </p>
                        <br>
                        <p style="font-family: JetBrainsMono; font-size: 14px; color: #89BEFA; margin: 2%; margin-bottom: 0;">
                            remove-recipe [RECIPENAME]
                        </p>
                        <br>
                        <p style="font-family: JetBrainsMono; font-size: 12px; color: #8D949D; margin: 2%; margin-bottom: 0;">
                            Remove a recipe from your collection permanently.
                        </p>
                    </button>
                    <button class="commandsbox"  onclick="document.location.href='commands/search-tags.html'">
                        <p style="font-family: JetBrainsMonoBold; font-size: 15px; color: #E7EDF2; margin: 2%; margin-bottom: 0;">
                            search-tags
                        </p>
                        <br>
                        <p style="font-family: JetBrainsMono; font-size: 14px; color: #89BEFA; margin: 2%; margin-bottom: 0;">
                            search-tags [TAGS]
                        </p>
                        <br>
                        <p style="font-family: JetBrainsMono; font-size: 12px; color: #8D949D; margin: 2%; margin-bottom: 0;">
                            Search recipes across your collection by their tags.
                        </p>
                    </button>
                </div>
                <div class="commandsrow">
                    <button class="commandsbox"  onclick="document.location.href='commands/add-tags.html'">
                        <p style="font-family: JetBrainsMonoBold; font-size: 15px; color: #E7EDF2; margin: 2%; margin-bottom: 0;">
                            add-tags
                        </p>
                        <br>
                        <p style="font-family: JetBrainsMono; font-size: 14px; color: #89BEFA; margin: 2%; margin-bottom: 0;">
                            add-tags [OPTIONS] [RECIPENAME] [TAGS]
                        </p>
                        <br>
                        <p style="font-family: JetBrainsMono; font-size: 12px; color: #8D949D; margin: 2%; margin-bottom: 0;">
                            Add tags to your recipes to organize your collection.
                        </p>
                    </button>
                    <button class="commandsbox"  onclick="document.location.href='commands/edit-recipe.html'">
                        <p style="font-family: JetBrainsMonoBold; font-size: 15px; color: #E7EDF2; margin: 2%; margin-bottom: 0;">
                            edit-recipe
                        </p>
                        <br>
                        <p style="font-family: JetBrainsMono; font-size: 14px; color: #89BEFA; margin: 2%; margin-bottom: 0;">
                            edit-recipe [RECIPENAME] [OPTIONS]
                        </p>
                        <br>
                        <p style="font-family: JetBrainsMono; font-size: 12px; color: #8D949D; margin: 2%; margin-bottom: 0;">
                            Edit parts of your recipes like ingredients, steps, and extra notes.
                        </p>
                    </button>
                    <div class="commandsbox" style="border: none; background-color: #0E1116;"></div>
                </div>
            </div>
        </center>

    </body>
</html>
