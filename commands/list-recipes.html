<!DOCTYPE html>
<html>
    <head>
        <style>
            @font-face {
                    font-family: JetBrainsMono;
                    src: url('JetBrainsMono-Regular.woff2') format('woff2');
                }
            @font-face {
                    font-family: JetBrainsMonoBold;
                    src: url('JetBrainsMono-Bold.woff2') format('woff2');
                }

            .codebox {
                display: flex;
                flex-direction: row;
                margin-left: 22%;
                height: 6ch;
                color: #E7EDF2;
                background-color: #171B21;
                width: 56%;
                align-items: center;
                font-family: JetBrainsMono;
                font-size: 15px;
                margin-top: 2%;
                margin-bottom: 4%;
                border: 1px solid #31363C;
            }

            .infobox {
                display: flex;
                flex-direction: row;
                margin-left: 22%;
                width: 56%;
                align-items: center;
                border-top-left-radius: 5px;
                border-top-right-radius: 5px;
                font-family: JetBrainsMono;
                margin-top: 2%;
                height: 5ch;
                background-color: #1D2127;
                color: #8D949D;
                font-size: 12px;
                margin-bottom: -2%;
                border: 1px solid #31363C;
            }

            .button {
                font-family: JetBrainsMonoBold;
                width: 170px;
                font-size: 15px;
                height: 37px;
                border-radius: 5px;
                border: 1px solid;
                margin-left: 22%;
            }
            
            .commandsbutton {background-color: #121720; border-color: #1c222c; color: white; transition: background-color 0.3s ease-in-out; transition: border-color 0.3 ease-in-out;}
            .commandsbutton:hover {background-color: #1c222c; border-color: #E7EDF2;}

            .navbutton {
                color: #8D949D;
                background-color: #0E1116;
                border: none;
                font-size: 15px;
                font-family: JetBrainsMono;
                border-radius: 5px;
                height: 3ch;
                transition: background-color 0.2s ease-in-out;
                flex: 1;
                margin-right: 1ch;
            }

            .navbutton:hover {background-color: #1c222c; color: #E7EDF2}


        </style>
    </head>
    <body style="background-color: #0E1116;">
        <div style="display: flex; flex-direction: row; margin-top: 2ch;">
            <nav>
                <button style="font-family: JetBrainsMono; font-size: 20px; color: #E7EDF2; flex: 1; border: none; background-color: #0E1116; margin-right: 2ch;">serialn</button>
                <button class="navbutton" onclick="document.location.href='../index.html'" style="width: 6ch">Home</button>
                <button class="navbutton" style="width: 10ch">Commands</button>
                <button class="navbutton" style="width: 9ch">Install</button>
            </nav>
        </div>

        <hr style="width: 100%; margin-top: 2ch; margin-bottom: 100px; border: none; border-top: 1px solid #31363C;">

        <p style="font-family: JetBrainsMonoBold; font-size: 35px; color: #DDAA3F; margin-left: 22%;">
            list-recipes
        </p>
        <p style="font-family: JetBrainsMono; font-size: 15pxpx; color: #8D949D; margin-left: 22%; margin-top: -2%; width: 56%;">
            Lists all recipes present in the recipeindex.csv file. If the recipeindex.csv file or the recipes folder is not present, it creates them. Run this command when you first install serialn. 
        </p>
        <p style="font-family: JetBrainsMonoBold; font-size: 12px; color: #8D949D; margin-left: 22%; margin-top: 5%;">
            SYNTAX
        </p>
        <hr style="width: 56%; border: none; border-top: 1px solid #31363C;">
        <div class="codebox" style="border-radius: 5px;">
            <p style="margin-left: 2%;">
                list-recipes
            </p>
        </div>
        <p style="font-family: JetBrainsMonoBold; font-size: 12px; color: #8D949D; margin-left: 22%; margin-top: 5%;">
            EXAMPLES
        </p>
        <hr style="width: 56%; border: none; border-top: 1px solid #31363C;">
        <div style="display: flex; flex-direction: column; gap: 0px;">
            <div class="infobox">
                <p style="margin-left: 2%;">
                    Lists all recipes
                </p>
            </div>
            <div class="codebox" style="border-bottom-left-radius: 5px; border-bottom-right-radius: 5px;">
                <p style="margin-left: 2%;">
                    list-recipes
                </p>
            </div>
        </div>
        <button class="button commandsbutton"><- All Commands</button>
    </body>
</html>
